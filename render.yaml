databases:
  - name: popup-db
    plan: free
    databaseName: popup
    user: popup

services:
  - type: web
    name: popup-app
    runtime: docker
    plan: free
    dockerfilePath: ./app/Dockerfile
    dockerContext: ./app
    healthCheckPath: /health
    dockerBuildArgs:
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        value: pk_test_51RX5wpFpXSJuaxQVgRq7ESvBfZuVGMUC50zBcr8lWtlaiSPjd4FShApmDX7BDlY9UYQ2vTrMpLoPvvdgZNvGythr00ge5JIFoi
      - key: VITE_API_URL
        value: https://popup-app.onrender.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: popup-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VITE_API_URL
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
