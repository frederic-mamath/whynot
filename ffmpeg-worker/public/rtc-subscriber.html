<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora RTC Subscriber</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
  </head>
  <body>
    <h1>RTC Subscriber (Worker)</h1>
    <video
      id="remote-video"
      autoplay
      playsinline
      muted
      style="width: 640px; height: 360px; background: #000"
    ></video>
    <canvas
      id="frame-canvas"
      width="640"
      height="360"
      style="display: none"
    ></canvas>
    <div id="status">Initializing...</div>

    <script>
      // Get params from URL
      const urlParams = new URLSearchParams(window.location.search);
      const appId = urlParams.get("appId");
      const channel = urlParams.get("channel");
      const token = urlParams.get("token");
      const uid = 999999; // Fixed UID for worker

      console.log("Initializing Agora RTC subscriber...");
      console.log("AppId:", appId);
      console.log("Channel:", channel);
      console.log("Token:", token ? "provided" : "missing");

      // Create Agora client
      const client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });

      // Global state exposed to Puppeteer
      window.agoraState = {
        client: null,
        videoTrack: null,
        audioTrack: null,
        videoReady: false,
        audioReady: false,
        joined: false,
        error: null,
      };

      // Audio processing state
      window.audioState = {
        audioContext: null,
        sourceNode: null,
        processorNode: null,
        sampleBuffer: [], // Buffer to accumulate samples between reads
        sampleRate: 48000,
        isCapturing: false,
      };

      // Setup audio capture pipeline
      function setupAudioCapture(audioTrack) {
        try {
          console.log("Setting up audio capture...");

          // Create AudioContext (sample rate will be determined by browser)
          const audioContext = new (
            window.AudioContext || window.webkitAudioContext
          )();
          window.audioState.audioContext = audioContext;
          window.audioState.sampleRate = audioContext.sampleRate;

          console.log(
            `AudioContext created with sample rate: ${audioContext.sampleRate}`,
          );

          // Get MediaStreamTrack from Agora audio track and create MediaStream
          // In Agora Web SDK 4.x, use getMediaStreamTrack() not getMediaStream()
          const mediaStreamTrack = audioTrack.getMediaStreamTrack();
          const mediaStream = new MediaStream([mediaStreamTrack]);

          // Create source node from MediaStream
          const sourceNode = audioContext.createMediaStreamSource(mediaStream);
          window.audioState.sourceNode = sourceNode;

          // Create ScriptProcessorNode (4096 samples buffer size, 1 input channel, 1 output channel)
          // Note: ScriptProcessorNode is deprecated but still widely supported
          // For production, consider migrating to AudioWorkletNode
          const processorNode = audioContext.createScriptProcessor(4096, 1, 1);
          window.audioState.processorNode = processorNode;

          // Process audio samples
          let processCallCount = 0;
          processorNode.onaudioprocess = (event) => {
            if (!window.audioState.isCapturing) return;

            processCallCount++;

            // Log first few calls for debugging
            if (processCallCount <= 3) {
              console.log(
                `🎵 onaudioprocess called (${processCallCount}), capturing: ${window.audioState.isCapturing}`,
              );
            }

            const inputBuffer = event.inputBuffer;
            const samples = inputBuffer.getChannelData(0); // Float32Array [-1.0, 1.0]

            // Log sample info on first call
            if (processCallCount === 1) {
              console.log(
                `First audio buffer: ${samples.length} samples, first value: ${samples[0]}`,
              );
            }

            // Add samples to buffer (convert to regular array for serialization)
            window.audioState.sampleBuffer.push(...samples);

            // Limit buffer size to prevent memory issues (max ~2 seconds of audio)
            const maxBufferSize = window.audioState.sampleRate * 2;
            if (window.audioState.sampleBuffer.length > maxBufferSize) {
              const excess =
                window.audioState.sampleBuffer.length - maxBufferSize;
              window.audioState.sampleBuffer.splice(0, excess);
              console.warn(`Audio buffer overflow, dropped ${excess} samples`);
            }
          };

          // Connect nodes: source -> processor -> destination
          // Note: We need to connect to destination even though we don't play audio,
          // otherwise the processor won't fire events
          sourceNode.connect(processorNode);
          processorNode.connect(audioContext.destination);

          // Resume AudioContext if suspended (required for headless browsers)
          if (audioContext.state === "suspended") {
            console.log("AudioContext suspended, resuming...");
            audioContext.resume().then(() => {
              console.log(`AudioContext resumed, state: ${audioContext.state}`);
            });
          } else {
            console.log(`AudioContext state: ${audioContext.state}`);
          }

          window.audioState.isCapturing = true;
          console.log("✅ Audio capture pipeline established");
        } catch (error) {
          console.error("Failed to setup audio capture:", error);
          window.agoraState.error = `Audio capture error: ${error.message}`;
        }
      }

      // Handle user published event
      client.on("user-published", async (user, mediaType) => {
        console.log(`User ${user.uid} published ${mediaType}`);
        document.getElementById("status").innerText =
          `Subscribing to ${mediaType}...`;

        try {
          await client.subscribe(user, mediaType);
          console.log(`Subscribed to user ${user.uid} ${mediaType}`);

          if (mediaType === "video") {
            const videoTrack = user.videoTrack;
            window.agoraState.videoTrack = videoTrack;

            // Play video and wait for it to actually start playing
            videoTrack.play("remote-video");

            // Wait for video element to start playing before marking ready
            const videoElement = document.getElementById("remote-video");
            videoElement.addEventListener(
              "playing",
              () => {
                window.agoraState.videoReady = true;
                console.log("✅ Video track ready and playing");
                document.getElementById("status").innerText = "Video streaming";
              },
              { once: true },
            );

            // Fallback: mark ready after 2 seconds if 'playing' event doesn't fire
            setTimeout(() => {
              if (!window.agoraState.videoReady) {
                window.agoraState.videoReady = true;
                console.log("✅ Video track ready (fallback timeout)");
              }
            }, 2000);
          }

          if (mediaType === "audio") {
            const audioTrack = user.audioTrack;
            audioTrack.play();
            window.agoraState.audioTrack = audioTrack;
            window.agoraState.audioReady = true;
            console.log("✅ Audio track ready");

            // Setup audio capture pipeline
            setupAudioCapture(audioTrack);
          }
        } catch (error) {
          console.error("Subscribe error:", error);
          window.agoraState.error = error.message;
          document.getElementById("status").innerText =
            `Error: ${error.message}`;
        }
      });

      // Handle user unpublished event
      client.on("user-unpublished", (user, mediaType) => {
        console.log(`User ${user.uid} unpublished ${mediaType}`);
        if (mediaType === "video") {
          window.agoraState.videoReady = false;
          window.agoraState.videoTrack = null;
        }
        if (mediaType === "audio") {
          window.agoraState.audioReady = false;
          window.agoraState.audioTrack = null;
        }
        document.getElementById("status").innerText = "User left channel";
      });

      // Handle user left event
      client.on("user-left", (user, reason) => {
        console.log(`User ${user.uid} left: ${reason}`);
        window.agoraState.videoReady = false;
        window.agoraState.audioReady = false;
        document.getElementById("status").innerText = `User left: ${reason}`;
      });

      // Handle connection state change
      client.on("connection-state-change", (curState, prevState, reason) => {
        console.log(
          `Connection state: ${prevState} -> ${curState} (${reason})`,
        );
        if (curState === "DISCONNECTED") {
          window.agoraState.joined = false;
          document.getElementById("status").innerText = "Disconnected";
        }
      });

      // Initialize connection
      async function init() {
        try {
          console.log("Setting client role to audience...");
          await client.setClientRole("audience");

          console.log(`Joining channel: ${channel}`);
          document.getElementById("status").innerText = "Joining channel...";

          await client.join(appId, channel, token, uid);

          console.log("✅ Successfully joined channel");
          window.agoraState.client = client;
          window.agoraState.joined = true;
          document.getElementById("status").innerText =
            "Connected - waiting for publisher...";
        } catch (error) {
          console.error("Failed to join channel:", error);
          window.agoraState.error = error.message;
          document.getElementById("status").innerText =
            `Error: ${error.message}`;
        }
      }

      // Start initialization
      init().catch((error) => {
        console.error("Init error:", error);
        window.agoraState.error = error.message;
      });

      // Frame extraction function exposed to Puppeteer
      window.getVideoFrame = function () {
        const video = document.getElementById("remote-video");
        const canvas = document.getElementById("frame-canvas");

        if (!video || !canvas) {
          return null;
        }

        // Check if video is playing and has dimensions
        if (
          video.videoWidth === 0 ||
          video.videoHeight === 0 ||
          video.paused ||
          video.readyState < 2
        ) {
          return null;
        }

        const ctx = canvas.getContext("2d");
        if (!ctx) return null;

        try {
          // Draw current video frame to canvas
          ctx.drawImage(video, 0, 0, 640, 360);

          // Get pixel data (RGBA format)
          const imageData = ctx.getImageData(0, 0, 640, 360);

          // Return pixel data as array (will be serialized by Puppeteer)
          return {
            width: 640,
            height: 360,
            data: Array.from(imageData.data), // Convert Uint8ClampedArray to Array
            timestamp: Date.now(),
          };
        } catch (error) {
          console.error("Frame capture error:", error);
          return null;
        }
      };

      // Audio samples extraction function exposed to Puppeteer
      window.getAudioSamples = function () {
        if (
          !window.audioState ||
          !window.audioState.isCapturing ||
          window.audioState.sampleBuffer.length === 0
        ) {
          return null;
        }

        try {
          // Get all accumulated samples
          const samples = window.audioState.sampleBuffer.slice(); // Copy array

          // Clear buffer for next batch
          window.audioState.sampleBuffer = [];

          return {
            samples: samples, // Float32Array values as regular array
            sampleRate: window.audioState.sampleRate,
            timestamp: Date.now(),
            sampleCount: samples.length,
          };
        } catch (error) {
          console.error("Audio sample extraction error:", error);
          return null;
        }
      };

      // Cleanup function exposed to Puppeteer
      window.cleanup = async function () {
        console.log("Cleaning up...");

        // Stop audio capture
        if (window.audioState) {
          window.audioState.isCapturing = false;

          if (window.audioState.processorNode) {
            window.audioState.processorNode.disconnect();
          }
          if (window.audioState.sourceNode) {
            window.audioState.sourceNode.disconnect();
          }
          if (window.audioState.audioContext) {
            await window.audioState.audioContext.close();
          }

          console.log("Audio capture stopped");
        }

        // Leave Agora channel
        if (window.agoraState.client) {
          await window.agoraState.client.leave();
          console.log("Left channel");
        }
      };
    </script>
  </body>
</html>
